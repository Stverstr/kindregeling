<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kindregeling — Stijn &amp; Marlies</title>
<style>
  :root{
    --stijn:#dbeafe; --stijn-border:#2563eb; --stijn-text:#1e3a8a;
    --marlies:#fce7f3; --marlies-border:#db2777; --marlies-text:#831843;
    --stijn-afwijking:#93c5fd; --stijn-afwijking-border:#3b82f6;
    --marlies-afwijking:#f9a8d4; --marlies-afwijking-border:#ec4899;
    --navy:#0f172a; --navy2:#111827; --purple:#7c3aed;
    --bg:#f8fafc; --card:#ffffff; --text:#1e293b; --muted:#64748b; --border:#e2e8f0;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);}

  /* ---------- app shell ---------- */
  #app{display:block;max-width:960px;margin:0 auto;padding:1.25rem 1rem 4rem;}
  header.top{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;}
  header.top h1{font-size:1.3rem;margin:0;}
  header.top .who{font-size:.85rem;color:var(--muted);margin-left:auto;}

  nav.tabs{display:flex;gap:.5rem;margin-bottom:1.25rem;border-bottom:1px solid var(--border);}
  nav.tabs button{background:none;border:none;padding:.7rem 1.1rem;font-size:.95rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;}
  nav.tabs button.active{color:var(--navy);border-bottom-color:var(--purple);}

  .view{display:none;}
  .view.active{display:block;}

  /* legend */
  .legend{display:flex;flex-wrap:wrap;gap:.9rem;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.9rem 1.1rem;margin-bottom:1rem;font-size:.82rem;}
  .legend .item{display:flex;align-items:center;gap:.4rem;}
  .swatch{width:16px;height:16px;border-radius:4px;flex:none;}

  /* filter bar */
  .navbar{position:sticky;top:.6rem;z-index:20;display:flex;align-items:center;gap:.5rem;background:var(--navy);color:#fff;border-radius:12px;padding:.6rem .7rem;margin-bottom:1rem;box-shadow:0 6px 16px rgba(15,23,42,.25);}
  .navbar .navlabel{flex:1;text-align:center;font-size:1.15rem;font-weight:800;letter-spacing:.01em;}
  .navbar .navbtn{background:rgba(255,255,255,.12);border:none;color:#fff;width:2.1rem;height:2.1rem;border-radius:8px;font-size:1.05rem;font-weight:700;cursor:pointer;line-height:1;}
  .navbar .navbtn:hover{background:rgba(255,255,255,.22);}
  .navbar .navbtn:disabled{opacity:.3;cursor:not-allowed;}
  .navbar .navbtn:disabled:hover{background:rgba(255,255,255,.12);}
  .navbar .navtoday{background:var(--purple);border:none;color:#fff;font-weight:700;font-size:.8rem;padding:.5rem .8rem;border-radius:8px;cursor:pointer;white-space:nowrap;}
  @media (max-width:520px){ .navbar .navlabel{font-size:.95rem;} }

  /* week table */
  .weekrow{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:.7rem;overflow:hidden;}
  .weekrow.cutover{border:2px solid var(--purple);}
  .weekhead{display:flex;justify-content:space-between;align-items:center;background:var(--navy2);color:#fff;padding:.5rem .9rem;font-size:.8rem;}
  .weekhead .wk{font-weight:700;}
  .weekhead .tag{font-weight:700;padding:.1rem .5rem;border-radius:5px;font-size:.72rem;}
  .tag.stijn{background:var(--stijn);color:var(--stijn-text);}
  .tag.marlies{background:var(--marlies);color:var(--marlies-text);}
  .days{display:grid;grid-template-columns:repeat(7,1fr);}
  .day{padding:.5rem .4rem;min-height:64px;border-right:1px solid rgba(0,0,0,.05);font-size:.78rem;position:relative;}
  .day:last-child{border-right:none;}
  .day .dname{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;}
  .day .dnum{font-weight:700;font-size:.95rem;}
  .day .lbl{display:block;margin-top:.2rem;font-size:.68rem;line-height:1.2;}
  .day .badges{margin-top:.2rem;line-height:1;}
  .day .badge{font-size:.8rem;margin-right:.15rem;cursor:default;}
  .day.today{outline:3px solid var(--purple);outline-offset:-3px;box-shadow:0 0 0 5px rgba(124,58,237,.18) inset;z-index:1;}
  .day.today .dnum{color:var(--purple);}
  .day.today .vandaag{display:inline-block;margin-left:.3rem;background:var(--purple);color:#fff;font-size:.6rem;font-weight:700;padding:.05rem .35rem;border-radius:5px;vertical-align:middle;}

  .day.stijn-normaal{background:var(--stijn);}
  .day.marlies-normaal{background:var(--marlies);}
  .day.stijn-afwijking{background:var(--stijn-afwijking);color:var(--stijn-text);border-top:3px solid var(--stijn-afwijking-border);border-bottom:3px solid var(--stijn-afwijking-border);}
  .day.marlies-afwijking{background:var(--marlies-afwijking);color:var(--marlies-text);border-top:3px solid var(--marlies-afwijking-border);border-bottom:3px solid var(--marlies-afwijking-border);}
  .day.marlies-normaal .lbl{color:#334155;}

  #sentinel{height:40px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.85rem;}

  /* log tab */
  .logentry{background:var(--card);border:1px solid var(--border);border-left:5px solid var(--purple);border-radius:10px;padding:1rem 1.2rem;margin-bottom:.9rem;}
  .logentry .date{font-size:.75rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-bottom:.35rem;}
  .logentry h3{margin:0 0 .5rem;font-size:1rem;}
  .logentry .q{margin:0 0 .5rem;font-size:.9rem;}
  .logentry .q b{color:var(--navy);}
  .logentry .a{margin:0;font-size:.9rem;background:#f1f5f9;border-radius:8px;padding:.6rem .8rem;}
  .logentry .a b{color:var(--navy);}
  .logentry.voorstel{border-left-color:#f59e0b;background:#fffbeb;}
  .logentry.voorstel .propbadge{display:inline-block;background:#f59e0b;color:#fff;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:.15rem .55rem;border-radius:6px;margin-bottom:.5rem;}
  .logentry.voorstel .optie{margin:0 0 .55rem;font-size:.9rem;background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:.6rem .8rem;}
  .logentry.voorstel .optie b{color:#92400e;}
  /* mini-kalender in het log-voorstel — zelfde look als de tijdlijn, compacter */
  .miniweeks{margin:.4rem 0 1rem;}
  .miniweeks .weekrow{margin-bottom:.35rem;border-radius:8px;}
  .miniweeks .weekhead{padding:.25rem .6rem;font-size:.62rem;}
  .miniweeks .weekhead .tag{font-size:.58rem;padding:.05rem .4rem;}
  .miniweeks .day{min-height:30px;padding:.2rem .2rem;font-size:.6rem;}
  .miniweeks .day .dnum{font-size:.68rem;}
  .miniweeks .day .dname{font-size:.52rem;}
  .miniweeks .day .lbl{font-size:.5rem;margin-top:.1rem;}
  .miniweeks .day .badges{margin-top:.1rem;}
  .miniweeks .day .badge{font-size:.6rem;background:none;color:inherit;padding:0;margin:0 .1rem 0 0;text-transform:none;letter-spacing:0;}
  .miniweeks .day.stijn-afwijking,.miniweeks .day.marlies-afwijking{border-top-width:2px;border-bottom-width:2px;}
  .minigap{text-align:center;color:var(--muted);font-size:1rem;margin:.1rem 0 .55rem;letter-spacing:.3em;}

  .addnote{font-size:.82rem;color:var(--muted);text-align:center;margin-top:1rem;}

  /* ---------- mobiel ---------- */
  @media (max-width:600px){
    #app{padding:.85rem .5rem 3rem;}
    header.top{flex-wrap:wrap;gap:.3rem .6rem;margin-bottom:.75rem;}
    header.top h1{font-size:1.1rem;}
    header.top .who{margin-left:0;width:100%;order:3;font-size:.78rem;}

    nav.tabs{gap:.2rem;margin-bottom:1rem;overflow-x:auto;}
    nav.tabs button{padding:.6rem .7rem;font-size:.85rem;white-space:nowrap;}

    .legend{gap:.5rem .7rem;padding:.7rem .8rem;font-size:.72rem;}
    .swatch{width:13px;height:13px;}

    .navbar{gap:.3rem;padding:.5rem;border-radius:10px;}
    .navbar .navbtn{width:1.9rem;height:1.9rem;font-size:.95rem;}
    .navbar .navtoday{padding:.5rem .6rem;font-size:.72rem;}

    .weekhead{flex-wrap:wrap;gap:.2rem .5rem;padding:.45rem .6rem;font-size:.72rem;}

    .day{padding:.35rem .2rem;min-height:52px;font-size:.68rem;}
    .day .dname{font-size:.58rem;}
    .day .dnum{font-size:.82rem;}
    .day .lbl{font-size:.58rem;}
    .day .badge{font-size:.68rem;}
    .day.today .vandaag{font-size:.5rem;padding:.05rem .25rem;margin-left:.15rem;}

    .logentry{padding:.8rem 1rem;}
  }
  @media (max-width:380px){
    .day{padding:.25rem .1rem;min-height:46px;font-size:.62rem;}
    .day .dnum{font-size:.75rem;}
  }
</style>
</head>
<body>

<!-- APP -->
<div id="app">
  <header class="top">
    <h1>👨‍👧‍👦 Kindregeling</h1>
    <span class="who">Stijn &amp; Marlies · Robbe &amp; Lore</span>
  </header>

  <nav class="tabs">
    <button class="active" data-tab="tijdlijn" onclick="showTab('tijdlijn')">Tijdlijn</button>
    <button data-tab="log" onclick="showTab('log')">Log — vraag &amp; beslissing</button>
  </nav>

  <!-- TIJDLIJN VIEW -->
  <section id="view-tijdlijn" class="view active">
    <div class="legend">
      <div class="item"><span class="swatch" style="background:var(--stijn)"></span>Stijn (volgens regeling)</div>
      <div class="item"><span class="swatch" style="background:var(--stijn-afwijking)"></span>Stijn (afwijkend)</div>
      <div class="item"><span class="swatch" style="background:var(--marlies)"></span>Marlies (volgens regeling)</div>
      <div class="item"><span class="swatch" style="background:var(--marlies-afwijking)"></span>Marlies (afwijkend)</div>
    </div>

    <div class="navbar" id="navbar">
      <button class="navbtn" id="navPrevYear" onclick="shiftYear(-1)" title="Vorig jaar">«</button>
      <button class="navbtn" id="navPrevMonth" onclick="shiftMonth(-1)" title="Vorige maand">‹</button>
      <div class="navlabel" id="navlabel">–</div>
      <button class="navbtn" id="navNextMonth" onclick="shiftMonth(1)" title="Volgende maand">›</button>
      <button class="navbtn" id="navNextYear" onclick="shiftYear(1)" title="Volgend jaar">»</button>
      <button class="navtoday" onclick="jumpToToday()">Vandaag</button>
    </div>

    <div id="weeks"></div>
    <div id="sentinel">meer laden…</div>
  </section>

  <!-- LOG VIEW -->
  <section id="view-log" class="view">
    <div id="logwrap"></div>
    <p class="addnote">Bij elke nieuwe afspraak wordt hier genoteerd wie wat gevraagd heeft en welke beslissing is genomen.</p>
  </section>
</div>

/* ============ TABS ============ */
function showTab(name){
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active', b.dataset.tab===name));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
}

// de wettelijke regel (Besluit Vlaamse Regering, art. paasvakantie) en geverifieerd tegen de
// officiële jaren — nog niet officieel gepubliceerd. Zelfde voorbehoud als bij herfst/krokus/kerst 2030-2031.

// Losse feestdagen: enkel decoratief icoon, géén invloed op wie de kinderen heeft.
const HOLIDAYS = [
  {date:'2026-01-01', icon:'🎆', title:'Nieuwjaar'},
  {date:'2026-04-05', icon:'🐰', title:'Pasen'},
  {date:'2027-01-01', icon:'🎆', title:'Nieuwjaar'},

];

function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function mondayOf(d){ const dt=new Date(d); const day=(dt.getDay()+6)%7; dt.setDate(dt.getDate()-day); dt.setHours(0,0,0,0); return dt; }
function isoWeekNum(d){
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dayNum=(t.getUTCDay()+6)%7;
  t.setUTCDate(t.getUTCDate()-dayNum+3);
  const firstThursday=new Date(Date.UTC(t.getUTCFullYear(),0,4));
  const diff=(t-firstThursday)/86400000;
  return 1+Math.round(diff/7);
}
function baseParent(date){
  const monday=mondayOf(date);
  const wk=isoWeekNum(date);
  const isEven=(wk%2===0);
  if(monday<CUTOVER) return isEven?'marlies':'stijn';
  return isEven?'stijn':'marlies';
}
function findException(iso){
  for(const ex of EXCEPTIONS){ if(iso>=ex.start && iso<=ex.end) return ex; }
  return null;
}
function findInfoEvents(iso){
  return INFO_EVENTS.filter(ev=> iso>=ev.start && iso<=ev.end).map(ev=>({icon:ev.icon, title:ev.title}));
}
function findHolidays(iso){
  return HOLIDAYS.filter(h=> h.date===iso).map(h=>({icon:h.icon, title:h.title}));
}
function dayInfo(date){
  const iso=fmt(date);
  const ex=findException(iso);
  const badges=[...findInfoEvents(iso), ...findHolidays(iso)];
  const def=baseParent(date);
  const who = ex ? ex.who : def;
  const afwijkend = ex ? (ex.who !== def) : false;
  const label = ex ? (ex.label||'') : '';
  return {who, afwijkend, label, badges};
}
function cssClass(info){
  return info.who + (info.afwijkend ? '-afwijking' : '-normaal');
}

const DAYNAMES=['MA','DI','WOE','DO','VR','ZAT','ZON'];
const MAANDEN=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
const MAANDEN_VOL=['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];

let cursor=null; // maandag van eerstvolgende te renderen week
let viewDate=new Date(); // maand/jaar dat momenteel getoond wordt in de navbar
let rowObserver=null;
const todayIso = fmt(new Date());

function renderWeek(monday){
  const wk=isoWeekNum(monday);
  const parity=(wk%2===0)?'EVEN':'ONEVEN';
  const base=baseParent(monday);
  const isCutoverWeek = fmt(monday)===fmt(CUTOVER);

  const row=document.createElement('div');
  row.className='weekrow'+(isCutoverWeek?' cutover':'');
  row.dataset.year=monday.getFullYear();
  row.dataset.month=monday.getMonth();

  const endDate=new Date(monday); endDate.setDate(endDate.getDate()+6);
  const rangeLabel = monday.getDate()+' '+MAANDEN[monday.getMonth()]+' – '+endDate.getDate()+' '+MAANDEN[endDate.getMonth()];

  const head=document.createElement('div');
  head.className='weekhead';
  head.innerHTML = `<span class="wk">Week ${wk} · ${rangeLabel}${isCutoverWeek?' · 🟣 Nieuwe regeling start':''}</span><span class="tag ${base}">${parity} · normaal ${base==='stijn'?'Stijn':'Marlies'}</span>`;
  row.appendChild(head);

  const days=document.createElement('div');
  days.className='days';
  for(let i=0;i<7;i++){
    const d=new Date(monday); d.setDate(d.getDate()+i);
    const info=dayInfo(d);
    const cell=document.createElement('div');
    const isToday = fmt(d)===todayIso;
    cell.className='day '+cssClass(info)+(isToday?' today':'');
    const badgeHtml = (info.badges&&info.badges.length) ? `<div class="badges">${info.badges.map(b=>`<span class="badge" title="${b.title}">${b.icon}</span>`).join('')}</div>` : '';
    cell.innerHTML = `<div class="dname">${DAYNAMES[i]}</div><div class="dnum">${d.getDate()}${isToday?'<span class="vandaag">VANDAAG</span>':''}</div>${info.label?`<span class="lbl">${info.label}</span>`:''}${badgeHtml}`;
    days.appendChild(cell);
  }
  row.appendChild(days);
  document.getElementById('weeks').appendChild(row);
  return row;
}

// Grenzen van de tijdlijn: niet verder terug dan vorige maand, niet verder
// vooruit dan december 2031.
function minViewDate(){
  const t=new Date();
  return new Date(t.getFullYear(), t.getMonth()-1, 1);
}
const MAX_VIEW_DATE = new Date(2031,11,1); // december 2031
const MONDAY_LIMIT = mondayOf(new Date(2032,0,1)); // niet renderen vanaf hier

function clampViewDate(d){
  const min=minViewDate();
  if(d<min) return min;
  if(d>MAX_VIEW_DATE) return new Date(MAX_VIEW_DATE);
  return d;
}

let sentinelObserver=null;

function loadMoreWeeks(n){
  for(let i=0;i<n;i++){
    if(cursor>=MONDAY_LIMIT){
      const sentinel=document.getElementById('sentinel');
      sentinel.textContent='Einde van de tijdlijn (2031)';
      if(sentinelObserver){ sentinelObserver.disconnect(); sentinelObserver=null; }
      break;
    }
    const row=renderWeek(cursor);
    if(rowObserver) rowObserver.observe(row);
    cursor=new Date(cursor); cursor.setDate(cursor.getDate()+7);
  }
}

function startFrom(monday){
  document.getElementById('weeks').innerHTML='';
  document.getElementById('sentinel').textContent='meer laden…';
  cursor=monday;
  loadMoreWeeks(14);
}

function renderNavLabel(){
  document.getElementById('navlabel').textContent = MAANDEN_VOL[viewDate.getMonth()]+' '+viewDate.getFullYear();
  updateNavButtons();
}

function updateNavButtons(){
  const min=minViewDate();
  const atMin = viewDate.getFullYear()===min.getFullYear() && viewDate.getMonth()===min.getMonth();
  const atMax = viewDate.getFullYear()===MAX_VIEW_DATE.getFullYear() && viewDate.getMonth()===MAX_VIEW_DATE.getMonth();
  document.getElementById('navPrevYear').disabled=atMin;
  document.getElementById('navPrevMonth').disabled=atMin;
  document.getElementById('navNextMonth').disabled=atMax;
  document.getElementById('navNextYear').disabled=atMax;
}

function firstMondayInMonth(year, month){
  // Maandag van de week die de 1e bevat kan nog in de vorige maand vallen
  // (bv. als de 1e op een dinsdag t/m zondag valt). Schuif in dat geval één
  // week op zodat de eerst getoonde rij ook echt in de doelmaand start —
  // anders "corrigeert" de scroll-observer het label meteen weer terug.
  let d=mondayOf(new Date(year, month, 1));
  if(d.getMonth()!==month || d.getFullYear()!==year) d.setDate(d.getDate()+7);
  return d;
}
function gotoViewDate(){
  const target=firstMondayInMonth(viewDate.getFullYear(), viewDate.getMonth());
  startFrom(target);
  renderNavLabel();
  restartSentinelObserver();
  document.getElementById('view-tijdlijn').scrollIntoView({behavior:'instant',block:'start'});
}
function shiftMonth(delta){
  viewDate=clampViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth()+delta, 1));
  gotoViewDate();
}
function shiftYear(delta){
  viewDate=clampViewDate(new Date(viewDate.getFullYear()+delta, viewDate.getMonth(), 1));
  gotoViewDate();
}
function jumpToToday(){
  const today=new Date(); today.setHours(0,0,0,0);
  viewDate=new Date(today.getFullYear(), today.getMonth(), 1);
  const lastWeek=new Date(today); lastWeek.setDate(today.getDate()-7);
  startFrom(mondayOf(lastWeek));
  renderNavLabel();
  restartSentinelObserver();
}

function restartSentinelObserver(){
  if(sentinelObserver) sentinelObserver.disconnect();
  const sentinel=document.getElementById('sentinel');
  sentinelObserver=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting) loadMoreWeeks(8); });
  }, {rootMargin:'400px'});
  sentinelObserver.observe(sentinel);
}

function initTimeline(){
  viewDate=new Date();
  renderNavLabel();

  rowObserver=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const y=parseInt(e.target.dataset.year,10), m=parseInt(e.target.dataset.month,10);
        viewDate=new Date(y,m,1);
        renderNavLabel();
      }
    });
  }, {rootMargin:'-64px 0px -85% 0px', threshold:0});

  const today=new Date(); today.setHours(0,0,0,0);
  const lastWeek=new Date(today); lastWeek.setDate(today.getDate()-7);
  startFrom(mondayOf(lastWeek));

  restartSentinelObserver();
}

// Mini-kalender voor voorstellen: zelfde opbouw als renderWeek, maar met
// tijdelijke overrides (het voorstel) bovenop de echte regeling. Wijzigt niets
// aan de echte tijdlijn.
function buildMiniWeeks(viz){
  const cont=document.createElement('div');
  cont.className='miniweeks';
  for(const mStr of viz.weeks){
    if(mStr==='gap'){
      const g=document.createElement('div');
      g.className='minigap';
      g.textContent='· · ·';
      cont.appendChild(g);
      continue;
    }
    const monday=new Date(mStr+'T00:00:00');
    const wk=isoWeekNum(monday);
    const base=baseParent(monday);
    const parity=(wk%2===0)?'EVEN':'ONEVEN';
    const endDate=new Date(monday); endDate.setDate(endDate.getDate()+6);
    const rangeLabel=monday.getDate()+' '+MAANDEN[monday.getMonth()]+' – '+endDate.getDate()+' '+MAANDEN[endDate.getMonth()];
    const row=document.createElement('div');
    row.className='weekrow';
    const head=document.createElement('div');
    head.className='weekhead';
    head.innerHTML=`<span class="wk">Week ${wk} · ${rangeLabel}</span><span class="tag ${base}">${parity} · normaal ${base==='stijn'?'Stijn':'Marlies'}</span>`;
    row.appendChild(head);
    const days=document.createElement('div');
    days.className='days';
    for(let i=0;i<7;i++){
      const dd=new Date(monday); dd.setDate(dd.getDate()+i);
      const iso=fmt(dd);
      let info=dayInfo(dd);
      const ov=(viz.overrides||[]).find(o=> iso>=o.start && iso<=o.end);
      if(ov) info={who:ov.who, afwijkend:ov.who!==baseParent(dd), label:ov.label||'', badges:info.badges};
      const extra=(viz.info||[]).filter(ev=> iso>=ev.start && iso<=ev.end).map(ev=>({icon:ev.icon, title:ev.title}));
      const badges=[...(info.badges||[]), ...extra];
      const cell=document.createElement('div');
      cell.className='day '+cssClass(info);
      const badgeHtml=badges.length?`<div class="badges">${badges.map(b=>`<span class="badge" title="${b.title}">${b.icon}</span>`).join('')}</div>`:'';
      cell.innerHTML=`<div class="dname">${DAYNAMES[i]}</div><div class="dnum">${dd.getDate()}</div>${info.label?`<span class="lbl">${info.label}</span>`:''}${badgeHtml}`;
      days.appendChild(cell);
    }
    row.appendChild(days);
    cont.appendChild(row);
  }
  return cont;
}

function renderLog(){
  const wrap=document.getElementById('logwrap');
  wrap.innerHTML='';
  const sorted=[...LOG].sort((a,b)=> b.date.localeCompare(a.date));
  for(const entry of sorted){
    const div=document.createElement('div');
    div.className='logentry'+(entry.status==='voorstel'?' voorstel':'');
    const d=new Date(entry.date+'T00:00:00');
    const dateLabel=d.getDate()+' '+MAANDEN[d.getMonth()]+' '+d.getFullYear();
    if(entry.status==='voorstel'){
      div.innerHTML = `<div class="date">${dateLabel}</div><div class="propbadge">Voorstel — nog te beslissen</div><h3>${entry.title}</h3><p class="q">${entry.q}</p>`;
      for(const o of (entry.options||[])){
        const p=document.createElement('p');
        p.className='optie';
        p.innerHTML=`<b>${o.t}:</b> ${o.d}`;
        div.appendChild(p);
        if(o.viz) div.appendChild(buildMiniWeeks(o.viz));
      }
    }else{
      div.innerHTML = `<div class="date">${dateLabel}</div><h3>${entry.title}</h3><p class="q">${entry.q}</p><p class="a">${entry.a}</p>`;
    }
    wrap.appendChild(div);
  }
}
